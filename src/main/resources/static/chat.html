<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服 - 聊天</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
  .container { width: 720px; height: 90vh; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); display: flex; flex-direction: column; overflow: hidden; }
  .header { background: #4f6ef7; color: #fff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header-controls { display: flex; align-items: center; gap: 12px; }
  .header-controls label { font-size: 13px; }
  .header-controls select { padding: 4px 8px; border: 1px solid rgba(255,255,255,.4); border-radius: 6px; background: rgba(255,255,255,.15); color: #fff; font-size: 13px; cursor: pointer; }
  .header-controls select option { color: #333; background: #fff; }
  .session-bar { display: flex; padding: 10px 24px; border-bottom: 1px solid #eee; background: #fafafa; align-items: center; gap: 10px; }
  .session-bar label { font-size: 13px; color: #666; white-space: nowrap; }
  .session-bar input { flex: 1; padding: 6px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
  .session-bar input:focus { border-color: #4f6ef7; }
  .session-bar .btn-clear { padding: 6px 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; color: #666; }
  .session-bar .btn-clear:hover { background: #f5f5f5; }
  .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; background: #f8f9fe; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #4f6ef7; color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: #fff; color: #333; border: 1px solid #e8e8e8; border-bottom-left-radius: 4px; }
  .msg.error { align-self: flex-start; background: #fff0f0; color: #c00; border: 1px solid #ffd0d0; border-bottom-left-radius: 4px; }
  .msg .cursor { display: inline-block; width: 2px; height: 16px; background: #4f6ef7; animation: blink .8s step-end infinite; vertical-align: text-bottom; margin-left: 1px; }
  .msg.user .cursor { background: #fff; }
  @keyframes blink { 50% { opacity: 0; } }
  .input-bar { display: flex; padding: 14px 24px; border-top: 1px solid #eee; gap: 10px; background: #fff; }
  .input-bar textarea { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 120px; }
  .input-bar textarea:focus { border-color: #4f6ef7; }
  .input-bar .btn-send { padding: 10px 28px; background: #4f6ef7; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .input-bar .btn-send:hover { background: #3d5bd9; }
  .input-bar .btn-send:disabled { background: #a0b0f0; cursor: not-allowed; }
  .status { font-size: 12px; color: #999; text-align: center; padding: 4px 0; }
  .empty-hint { flex: 1; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; flex-direction: column; gap: 8px; }
  .empty-hint .icon { font-size: 40px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>💬 智能客服</h1>
    <div class="header-controls">
      <label for="modeSelect">模式</label>
      <select id="modeSelect">
        <option value="sync">同步</option>
        <option value="stream" selected>流式 (SSE)</option>
      </select>
    </div>
  </div>
  <div class="session-bar">
    <label for="sessionId">会话 ID</label>
    <input id="sessionId" value="default" placeholder="输入会话 ID">
    <button class="btn-clear" onclick="clearChat()">清空对话</button>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-hint">
      <div class="icon">🤖</div>
      <div>输入消息开始对话</div>
    </div>
  </div>
  <div class="status" id="status"></div>
  <div class="input-bar">
    <textarea id="messageInput" rows="1" placeholder="输入消息，按 Enter 发送" onkeydown="handleKey(event)"></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>
<script>
const API_BASE = '';
let streaming = false;

function addMsg(type, content, isStreaming) {
  const area = document.getElementById('chatArea');
  const empty = area.querySelector('.empty-hint');
  if (empty) empty.remove();

  let container = area.querySelector('.msg.streaming');
  if (isStreaming && container) {
    container.textContent = content;
    area.scrollTop = area.scrollHeight;
    return;
  }

  const div = document.createElement('div');
  div.className = 'msg ' + type;
  if (isStreaming) div.classList.add('streaming');
  div.textContent = content;
  if (isStreaming) {
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    div.appendChild(cursor);
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function setLoading(loading) {
  document.getElementById('sendBtn').disabled = loading;
  document.getElementById('messageInput').disabled = loading;
}

function clearChat() {
  const area = document.getElementById('chatArea');
  area.innerHTML = '<div class="empty-hint"><div class="icon">🤖</div><div>输入消息开始对话</div></div>';
  setStatus('');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  if (streaming) return;
  const input = document.getElementById('messageInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const sessionId = document.getElementById('sessionId').value.trim() || 'default';
  const mode = document.getElementById('modeSelect').value;

  addMsg('user', msg);
  setLoading(true);
  setStatus('思考中...');

  if (mode === 'sync') {
    sendSync(sessionId, msg);
  } else {
    sendStream(sessionId, msg);
  }
}

function sendSync(sessionId, msg) {
  const url = API_BASE + '/api/chat?sessionId=' + encodeURIComponent(sessionId) + '&message=' + encodeURIComponent(msg);
  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(text => {
      addMsg('bot', text);
      setStatus('')
    })
    .catch(err => {
      addMsg('error', '请求失败：' + err.message);
      setStatus('')
    })
    .finally(() => setLoading(false));
}

function sendStream(sessionId, msg) {
  const url = API_BASE + '/api/chat/stream?sessionId=' + encodeURIComponent(sessionId) + '&message=' + encodeURIComponent(msg);
  const area = document.getElementById('chatArea');

  addMsg('bot', '', true);
  const botMsg = area.querySelector('.msg.streaming');
  let fullContent = '';

  const evtSource = new EventSource(url);

  evtSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      if (data.content) {
        fullContent += data.content;
        addMsg('bot', fullContent, true);
      }
    } catch(_) {}
  };

  evtSource.addEventListener('done', function(e) {
    evtSource.close();
    streaming = false;
    const cursor = botMsg?.querySelector('.cursor');
    if (cursor) cursor.remove();
    if (botMsg) botMsg.classList.remove('streaming');
    setLoading(false);
    setStatus('');
  });

  evtSource.addEventListener('error', function(e) {
    evtSource.close();
    streaming = false;
    if (botMsg) botMsg.remove();
    if (fullContent) {
      addMsg('bot', fullContent);
    } else {
      addMsg('error', '连接失败或服务器错误');
    }
    setLoading(false);
    setStatus('');
  });

  streaming = true;
  evtSource.onopen = function() {
    setStatus('响应中...');
  };
}
</script>
</body>
</html>
