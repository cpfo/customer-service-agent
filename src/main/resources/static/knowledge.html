<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服 - 知识库管理</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; padding: 32px; }
  .container { width: 900px; }
  .header { background: #4f6ef7; color: #fff; padding: 20px 28px; border-radius: 16px 16px 0 0; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .subtitle { font-size: 13px; opacity: .8; }
  .card { background: #fff; border-radius: 0 0 16px 16px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 24px 28px; }
  .card + .card { margin-top: 16px; border-radius: 16px; }
  .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { padding: 8px 20px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: #4f6ef7; color: #fff; }
  .btn-primary:hover { background: #3d5bd9; }
  .btn-danger { background: #ff4d4f; color: #fff; }
  .btn-danger:hover { background: #e04345; }
  .btn-outline { background: #fff; color: #666; border: 1px solid #ddd; }
  .btn-outline:hover { background: #f5f5f5; }
  .btn-success { background: #52c41a; color: #fff; }
  .btn-success:hover { background: #45a818; }
  .btn-warning { background: #faad14; color: #fff; }
  .btn-warning:hover { background: #d99a0f; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .file-input-wrap { display: flex; gap: 10px; align-items: center; flex: 1; }
  .file-input-wrap input[type=file] { font-size: 13px; flex: 1; }
  .upload-progress { font-size: 12px; color: #999; margin-top: 6px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #eee; font-size: 13px; color: #666; font-weight: 600; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  td .preview { color: #888; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  td .actions { display: flex; gap: 6px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; background: #f0f5ff; color: #4f6ef7; }
  .empty-row td { text-align: center; color: #bbb; padding: 32px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 640px; max-width: 90vw; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,.2); }
  .modal-header { padding: 18px 24px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
  .modal-close:hover { color: #333; }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
  .modal-body pre { background: #f6f8fa; padding: 16px; border-radius: 8px; font-size: 13px; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; font-family: "SF Mono", Consolas, monospace; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .meta-item { display: flex; gap: 8px; font-size: 13px; }
  .meta-item .label { color: #666; white-space: nowrap; }
  .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 14px; color: #fff; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.success { background: #52c41a; }
  .toast.error { background: #ff4d4f; }
  .toast.info { background: #4f6ef7; }
  .stats { display: flex; gap: 24px; margin-bottom: 16px; }
  .stat { display: flex; flex-direction: column; align-items: center; background: #f8f9fe; padding: 12px 24px; border-radius: 10px; }
  .stat-num { font-size: 24px; font-weight: 700; color: #4f6ef7; }
  .stat-label { font-size: 12px; color: #999; }
  .search-box { display: flex; gap: 8px; flex: 1; }
  .search-box input { flex: 1; padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; max-width: 280px; }
  .search-box input:focus { border-color: #4f6ef7; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📚 知识库管理</h1>
      <div class="subtitle">管理客服知识库文档，支持上传/删除/查看/重载</div>
    </div>
    <div style="font-size:13px;opacity:.8" id="baseUrlDisplay"></div>
  </div>

  <!-- 上传 -->
  <div class="card">
    <div class="section-title">📤 上传文档</div>
    <div class="toolbar">
      <div class="file-input-wrap">
        <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.md,.html,.htm">
      </div>
      <button class="btn btn-success" id="uploadBtn" onclick="uploadFile()">上传</button>
    </div>
    <div class="upload-progress" id="uploadStatus">&nbsp;</div>
  </div>

  <!-- 文件列表 -->
  <div class="card">
    <div class="toolbar" style="margin-bottom:16px;justify-content:space-between">
      <div class="section-title" style="margin-bottom:0">📋 文件列表</div>
      <div class="toolbar">
        <div class="search-box">
          <input id="searchInput" placeholder="搜索文件名..." oninput="renderTable()">
        </div>
        <button class="btn btn-outline" onclick="loadList()">🔄 刷新</button>
        <button class="btn btn-warning" onclick="reloadAll()">♻ 重载知识库</button>
      </div>
    </div>
    <div id="statsArea"></div>
    <table>
      <thead>
        <tr><th>文件名</th><th>块数</th><th>预览</th><th>添加时间</th><th>操作</th></tr>
      </thead>
      <tbody id="fileTableBody">
        <tr class="empty-row"><td colspan="5">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detailTitle">文件详情</h2>
      <button class="modal-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API_BASE = '';
document.getElementById('baseUrlDisplay').textContent = 'Base: ' + window.location.origin;

let fileList = [];

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

function openDetail(filename) {
  document.getElementById('detailModal').classList.add('active');
  document.getElementById('detailTitle').textContent = '📄 ' + filename;
  document.getElementById('detailBody').innerHTML = '<div style="text-align:center;color:#999;padding:20px">加载中...</div>';
  fetch(API_BASE + '/api/knowledge/' + encodeURIComponent(filename))
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      const m = data.meta || {};
      document.getElementById('detailBody').innerHTML =
        '<div class="meta-grid">' +
          '<div class="meta-item"><span class="label">文件名：</span><span>' + esc(m.filename) + '</span></div>' +
          '<div class="meta-item"><span class="label">块数：</span><span>' + m.chunkCount + '</span></div>' +
          '<div class="meta-item"><span class="label">添加时间：</span><span>' + esc(m.addedAt || '-') + '</span></div>' +
        '</div>' +
        '<div style="font-weight:600;font-size:13px;margin-bottom:8px">完整内容：</div>' +
        '<pre>' + esc(data.content || '') + '</pre>';
    })
    .catch(err => {
      document.getElementById('detailBody').innerHTML = '<div style="color:#c00;padding:16px">加载失败：' + esc(err.message) + '</div>';
    });
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('active');
}

document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    return d.toLocaleString('zh-CN', { hour12: false });
  } catch(_) { return iso; }
}

function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? fileList.filter(f => f.filename.toLowerCase().includes(q)) : fileList;
  const tbody = document.getElementById('fileTableBody');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">' + (fileList.length === 0 ? '暂无文件，请上传或重载知识库' : '未匹配到文件') + '</td></tr>';
    document.getElementById('statsArea').innerHTML = fileList.length === 0 ? '' :
      '<div class="stats"><div class="stat"><span class="stat-num">' + fileList.length + '</span><span class="stat-label">总文件</span></div></div>';
    return;
  }

  tbody.innerHTML = filtered.map(f =>
    '<tr>' +
      '<td><strong>' + esc(f.filename) + '</strong></td>' +
      '<td><span class="badge">' + f.chunkCount + '</span></td>' +
      '<td><span class="preview" title="' + esc(f.preview) + '">' + esc(f.preview || '-') + '</span></td>' +
      '<td style="white-space:nowrap">' + formatTime(f.addedAt) + '</td>' +
      '<td><div class="actions">' +
        '<button class="btn btn-outline" onclick="openDetail(\'' + esc(f.filename) + '\')">查看</button>' +
        '<button class="btn btn-danger" onclick="deleteFile(\'' + esc(f.filename) + '\')">删除</button>' +
      '</div></td>' +
    '</tr>'
  ).join('');

  document.getElementById('statsArea').innerHTML =
    '<div class="stats">' +
      '<div class="stat"><span class="stat-num">' + fileList.length + '</span><span class="stat-label">总文件</span></div>' +
      '<div class="stat"><span class="stat-num">' + filtered.reduce((s, f) => s + f.chunkCount, 0) + '</span><span class="stat-label">总块数</span></div>' +
    '</div>';
}

function loadList() {
  document.getElementById('fileTableBody').innerHTML = '<tr class="empty-row"><td colspan="5">加载中...</td></tr>';
  fetch(API_BASE + '/api/knowledge')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      fileList = data.files || [];
      renderTable();
    })
    .catch(err => {
      document.getElementById('fileTableBody').innerHTML = '<tr class="empty-row"><td colspan="5" style="color:#c00">加载失败：' + esc(err.message) + '</td></tr>';
      toast('加载失败：' + err.message, 'error');
    });
}

function uploadFile() {
  const input = document.getElementById('fileInput');
  const file = input.files[0];
  if (!file) { toast('请先选择文件', 'error'); return; }
  if (file.size > 10 * 1024 * 1024) { toast('文件超过 10MB 限制', 'error'); return; }

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  document.getElementById('uploadStatus').textContent = '上传中...';

  const formData = new FormData();
  formData.append('file', file);

  fetch(API_BASE + '/api/knowledge', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast('上传成功：' + data.filename + '（' + data.chunkCount + ' 块）', 'success');
        input.value = '';
        loadList();
      } else {
        toast('上传失败：' + (data.message || '未知错误'), 'error');
      }
    })
    .catch(err => {
      toast('上传失败：' + err.message, 'error');
    })
    .finally(() => {
      btn.disabled = false;
      document.getElementById('uploadStatus').textContent = '&nbsp;';
    });
}

function deleteFile(filename) {
  if (!confirm('确认删除「' + filename + '」？')) return;
  fetch(API_BASE + '/api/knowledge/' + encodeURIComponent(filename), { method: 'DELETE' })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast('已删除：' + filename, 'success');
        loadList();
      } else {
        toast('删除失败：' + (data.message || '未知错误'), 'error');
      }
    })
    .catch(err => {
      toast('删除失败：' + err.message, 'error');
    });
}

function reloadAll() {
  if (!confirm('确认重新加载知识库？将清空所有已加载内容，重新扫描 classpath:knowledge/。')) return;
  fetch(API_BASE + '/api/knowledge/reload', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        toast('重载完成，共 ' + data.fileCount + ' 个文件', 'success');
        loadList();
      } else {
        toast('重载失败：' + (data.message || '未知错误'), 'error');
      }
    })
    .catch(err => {
      toast('重载失败：' + err.message, 'error');
    });
}

loadList();
</script>
</body>
</html>
