spring:
  main:
    web-application-type: servlet
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-flash
      embedding:
        options:
          model: text-embedding-v3

    mcp:
      client:
        enabled: true
        type: sync                   # 可选 sync 或 async
        request-timeout: 60s          # 请求超时时间
        toolcallback:
          enabled: true               # 自动将远端工具封装为 ToolCallbackProvider
        streamable-http:
          connections:
            fastapi-mcp-server: # 连接名称，可自定义
              url: http://localhost:8081  # MCP Server 基础地址
              endpoint: /mcp  # MCP Server 监听的端点路径

  redis:
    host: localhost
    port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  retrieval:
    vector-top-k: 10
    fusion-top-k: 10

  reranker:
    type: cross-encoder
    top-k: 3
    cross-encoder-model: gte-rerank

  query-rewriting:
    enabled: true
    num-rewrites: 2

  context-compression:
    enabled: true

  cache:
    enabled: true
    ttl-minutes: 60

  fallback:
    enabled: true
    max-retries: 1

  handoff:
    enabled: true
    phone: "400-888-8888"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: customer-service-agent
