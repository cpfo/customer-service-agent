spring:
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-flash
      embedding:
        options:
          model: text-embedding-v3

  redis:
    host: localhost
    port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  retrieval:
    vector-top-k: 10
    bm25-enabled: true
    bm25-top-k: 10
    fusion-top-k: 10
    vector-weight: 0.5
    bm25-weight: 0.5

  reranker:
    type: cross-encoder
    top-k: 3
    cross-encoder-model: gte-rerank

  query-rewriting:
    enabled: true
    num-rewrites: 2

  context-compression:
    enabled: true

  cache:
    enabled: true
    ttl-minutes: 60

  fallback:
    enabled: true
    max-retries: 1

  handoff:
    enabled: true
    phone: "400-888-8888"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: customer-service-agent
